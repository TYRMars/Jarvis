name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # The web UI is bundled into `harness-server` at compile time
      # via `include_dir!("...apps/jarvis-web/dist")`. Build it first
      # so the macro has the real assets to embed; otherwise
      # `harness-server`'s `build.rs` plants a placeholder note and
      # the binary ships without a usable UI.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/jarvis-web/package-lock.json
      - name: Build web UI
        working-directory: apps/jarvis-web
        run: |
          npm ci
          npm run build

      - name: Cargo check (default features)
        run: cargo check --workspace
      - name: Cargo check (--features cloud)
        run: cargo check --workspace --features cloud
      - name: Cargo clippy (default features)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Cargo clippy (--features cloud)
        run: cargo clippy --workspace --all-targets --features cloud -- -D warnings
      - name: Cargo test
        run: cargo test --workspace --verbose

      - name: Vitest
        working-directory: apps/jarvis-web
        run: npm test
      - name: ESLint
        working-directory: apps/jarvis-web
        run: npm run lint
