name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # The web UI is bundled into `harness-server` at compile time
      # via `include_dir!("...apps/jarvis-web/dist")`. Build it first
      # so the macro has the real assets to embed; otherwise
      # `harness-server`'s `build.rs` plants a placeholder note and
      # the binary ships without a usable UI.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/jarvis-web/package-lock.json
      - name: Build web UI
        working-directory: apps/jarvis-web
        run: |
          npm ci
          npm run build

      # `jarvis-desktop` is a Tauri shell that pulls in WebKitGTK +
      # GObject system libs on Linux (`libgtk-3-dev`,
      # `libwebkit2gtk-4.1-dev`, `librsvg2-dev`, etc.). We don't
      # currently ship a Linux desktop build, and installing the
      # full GTK toolchain would tax every PR by ~1–2 min of apt
      # time. Excluding the crate keeps Linux CI lean while we
      # still verify it on contributor macOS machines (and a
      # future Linux desktop pipeline can install the deps and
      # drop the exclusion). Whenever you touch this list,
      # mirror it in every cargo invocation below.
      - name: Cargo check (default features)
        run: cargo check --workspace --exclude jarvis-desktop
      - name: Cargo check (--features cloud)
        run: cargo check --workspace --features cloud --exclude jarvis-desktop
      - name: Cargo clippy (default features)
        run: cargo clippy --workspace --all-targets --exclude jarvis-desktop -- -D warnings
      - name: Cargo clippy (--features cloud)
        run: cargo clippy --workspace --all-targets --features cloud --exclude jarvis-desktop -- -D warnings
      - name: Cargo test
        run: cargo test --workspace --exclude jarvis-desktop --verbose

      - name: Vitest
        working-directory: apps/jarvis-web
        run: npm test
      - name: ESLint
        working-directory: apps/jarvis-web
        run: npm run lint
