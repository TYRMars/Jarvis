<!DOCTYPE html>
<html>
<head>
    <title>Agent流式聊天演示</title>
    <meta charset="utf-8">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .chat-container {
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 10px;
            height: 400px;
            overflow-y: auto;
            margin-bottom: 10px;
        }
        .message {
            margin-bottom: 10px;
            padding: 8px 12px;
            border-radius: 18px;
            max-width: 80%;
            word-wrap: break-word;
        }
        .user-message {
            background-color: #dcf8c6;
            margin-left: auto;
            margin-right: 0;
        }
        .agent-message {
            background-color: #f1f0f0;
            margin-right: auto;
            margin-left: 0;
        }
        .input-container {
            display: flex;
        }
        #message-input {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-right: 10px;
        }
        button {
            padding: 10px 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        .typing-indicator {
            display: inline-block;
            padding: 8px 12px;
            background-color: #f1f0f0;
            border-radius: 18px;
            margin-bottom: 10px;
        }
        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #999;
            border-radius: 50%;
            margin-right: 5px;
            animation: typing 1s infinite;
        }
        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
            margin-right: 0;
        }
        @keyframes typing {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .hidden {
            display: none;
        }
        .settings {
            margin-bottom: 20px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        select, input[type="text"] {
            padding: 8px;
            margin-right: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>Agent流式聊天演示</h1>
    
    <div class="settings">
        <div>
            <label for="agent-id">Agent ID:</label>
            <input type="text" id="agent-id" value="1">
            
            <label for="session-id">会话ID:</label>
            <input type="text" id="session-id" value="web-demo">
            
            <label for="api-type">API类型:</label>
            <select id="api-type">
                <option value="standard">标准</option>
                <option value="graph" selected>Graph</option>
            </select>
            
            <label>
                <input type="checkbox" id="use-stream" checked>
                使用流式输出
            </label>
        </div>
    </div>
    
    <div class="chat-container" id="chat-container">
        <div class="message agent-message">您好！我是智能助手，请问有什么可以帮您？</div>
    </div>
    
    <div class="typing-indicator hidden" id="typing-indicator">
        <span></span>
        <span></span>
        <span></span>
    </div>
    
    <div class="input-container">
        <input type="text" id="message-input" placeholder="输入消息..." autofocus>
        <button id="send-button">发送</button>
    </div>
    
    <script>
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const sendButton = document.getElementById('send-button');
        const typingIndicator = document.getElementById('typing-indicator');
        const agentIdInput = document.getElementById('agent-id');
        const sessionIdInput = document.getElementById('session-id');
        const apiTypeSelect = document.getElementById('api-type');
        const useStreamCheckbox = document.getElementById('use-stream');
        
        // API基础URL
        const baseUrl = '/api';
        
        // 发送消息
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;
            
            // 清空输入框
            messageInput.value = '';
            
            // 显示用户消息
            appendMessage(message, 'user');
            
            // 显示输入指示器
            typingIndicator.classList.remove('hidden');
            
            // 获取设置
            const agentId = agentIdInput.value;
            const sessionId = sessionIdInput.value;
            const apiType = apiTypeSelect.value;
            const useStream = useStreamCheckbox.checked;
            
            // 确定API端点
            let endpoint = `${baseUrl}/agents/${agentId}/chat`;
            if (apiType === 'graph') {
                endpoint = `${baseUrl}/agents/${agentId}/graph-chat`;
            }
            
            // 构造请求数据
            const requestData = {
                session_id: sessionId,
                message,
                stream: useStream
            };
            
            try {
                // 根据是否使用流式输出选择不同的请求方式
                if (useStream) {
                    // 使用SSE进行流式输出
                    const eventSource = new EventSource(`${endpoint}?session_id=${sessionId}&message=${encodeURIComponent(message)}&stream=true`);
                    
                    let responseMessage = '';
                    let messageElement = null;
                    
                    // 处理开始事件
                    eventSource.addEventListener('start', () => {
                        // 创建一个空的回复消息
                        responseMessage = '';
                        messageElement = appendMessage('', 'agent');
                    });
                    
                    // 处理块事件
                    eventSource.addEventListener('chunk', (event) => {
                        const data = JSON.parse(event.data);
                        if (data.content) {
                            responseMessage += data.content;
                            
                            // 更新已有消息
                            if (messageElement) {
                                messageElement.textContent = responseMessage;
                                chatContainer.scrollTop = chatContainer.scrollHeight;
                            }
                        }
                    });
                    
                    // 处理完成事件
                    eventSource.addEventListener('done', () => {
                        // 隐藏输入指示器
                        typingIndicator.classList.add('hidden');
                        
                        // 关闭事件源
                        eventSource.close();
                    });
                    
                    // 处理错误事件
                    eventSource.addEventListener('error', (event) => {
                        const data = event.data ? JSON.parse(event.data) : { message: '连接错误' };
                        
                        // 显示错误消息
                        appendMessage(`错误: ${data.message}`, 'agent');
                        
                        // 隐藏输入指示器
                        typingIndicator.classList.add('hidden');
                        
                        // 关闭事件源
                        eventSource.close();
                    });
                } else {
                    // 使用常规API调用
                    const response = await fetch(endpoint, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(requestData)
                    });
                    
                    const result = await response.json();
                    
                    // 隐藏输入指示器
                    typingIndicator.classList.add('hidden');
                    
                    if (result.success) {
                        // 显示回复消息
                        appendMessage(result.data, 'agent');
                    } else {
                        // 显示错误消息
                        appendMessage(`错误: ${result.message}`, 'agent');
                    }
                }
            } catch (error) {
                console.error('请求错误:', error);
                
                // 隐藏输入指示器
                typingIndicator.classList.add('hidden');
                
                // 显示错误消息
                appendMessage(`错误: ${error.message}`, 'agent');
            }
        }
        
        // 添加消息到聊天界面
        function appendMessage(text, sender) {
            const messageElement = document.createElement('div');
            messageElement.className = `message ${sender}-message`;
            messageElement.textContent = text;
            
            chatContainer.appendChild(messageElement);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            return messageElement;
        }
        
        // 设置事件监听器
        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
